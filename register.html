<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register — SideChat AI</title>
    <link rel="stylesheet" href="css/style.css" />
    <style>
      body {
        background: #080c18;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 20px;
      }
      .auth-card {
        background: #0f1729;
        border: 1px solid #1e2d45;
        border-radius: 24px;
        padding: 48px;
        width: 100%;
        max-width: 440px;
      }
      .auth-logo {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 18px;
        font-weight: 700;
        margin-bottom: 32px;
        justify-content: center;
        text-decoration: none;
        color: #f1f5f9;
      }
      .logo-icon {
        width: 36px;
        height: 36px;
        background: linear-gradient(135deg, #6366f1, #06b6d4);
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
      }
      .auth-title {
        font-size: 26px;
        font-weight: 700;
        margin-bottom: 8px;
        text-align: center;
        color: #f1f5f9;
      }
      .auth-sub {
        color: #64748b;
        font-size: 14px;
        text-align: center;
        margin-bottom: 32px;
      }
      .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      .form-group {
        margin-bottom: 18px;
      }
      .form-label {
        display: block;
        font-size: 13px;
        font-weight: 500;
        margin-bottom: 6px;
        color: #f1f5f9;
      }
      .form-input {
        width: 100%;
        background: #111827;
        border: 1px solid #1e2d45;
        border-radius: 10px;
        padding: 11px 14px;
        font-size: 14px;
        color: #f1f5f9;
        font-family: inherit;
        outline: none;
        transition: all 0.2s;
      }
      .form-input:focus {
        border-color: #6366f1;
        box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
      }
      .form-input::placeholder {
        color: #64748b;
      }
      .btn-primary {
        display: block;
        width: 100%;
        background: #6366f1;
        color: white;
        border: none;
        border-radius: 10px;
        padding: 12px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        text-align: center;
        text-decoration: none;
        margin-top: 8px;
        font-family: inherit;
      }
      .btn-primary:hover {
        background: #5254cc;
      }
      .auth-switch {
        text-align: center;
        margin-top: 20px;
        font-size: 13px;
        color: #64748b;
      }
      .auth-switch a {
        color: #818cf8;
        text-decoration: none;
        font-weight: 500;
      }
      .terms {
        font-size: 11px;
        color: #64748b;
        text-align: center;
        margin-top: 16px;
      }
    </style>
  </head>
  <body>
    <div class="auth-card">
      <a class="auth-logo" href="index.html">
        <div
          class="logo-icon"
          style="
            font-size: 13px;
            font-weight: 800;
            letter-spacing: -1px;
            color: white;
          "
        >
          SC
        </div>
        SideChat AI
      </a>
      <div class="auth-title">Create your account</div>
      <div class="auth-sub">Start your 14-day free trial</div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">First name</label>
          <input class="form-input" placeholder="Harry" />
        </div>
        <div class="form-group">
          <label class="form-label">Last name</label>
          <input class="form-input" placeholder="yousaf" />
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Business email</label>
        <input class="form-input" type="email" placeholder="you@business.com" />
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input
          class="form-input"
          type="password"
          placeholder="Min. 8 characters"
        />
      </div>
      <a class="btn-primary" href="dashboard.html">Create account →</a>
      <div class="auth-switch">
        Already have an account? <a href="login.html">Sign in</a>
      </div>
      <div class="terms">
        By signing up you agree to our Terms of Service and Privacy Policy.
      </div>
    </div>
  </body>
</html>
